# Alembic Configuration
# =====================
#
# This file configures Alembic for database schema migrations.
# In this coursework project, we use SQLAlchemy's create_all() in the
# application lifespan for simplicity. Alembic is included as the
# production-ready migration tool that would be used in deployment.
#
# To initialise migrations:
#   alembic init migrations
#
# To generate a migration after model changes:
#   alembic revision --autogenerate -m "add_new_column"
#
# To apply migrations:
#   alembic upgrade head

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# SQLAlchemy URL — overridden at runtime by env.py using settings.DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/urban_env

# Timezone for migration timestamps
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
