[pytest]
# ──────────────────────────────────────────────────────────────
# Run all tests:           pytest
# Run with coverage:       pytest --cov=. --cov-report=html --cov-report=term-missing
# Run unit tests only:     pytest tests/unit/
# Run integration only:    pytest tests/integration/
# ──────────────────────────────────────────────────────────────
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: Pure logic tests (no DB, no HTTP)
    integration: Tests requiring database and/or HTTP client
    postgres: Tests requiring a real PostgreSQL database (skipped in SQLite)

filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.*
    ignore::DeprecationWarning:aiosqlite.*
